<!DOCTYPE html>
<html xmlns:wicket="http://wicket.apache.org" lang="pt-BR">
<body>
<wicket:panel>

    <div class="erp-list">

        <div class="erp-list-header">
            <span class="erp-list-col erp-list-col--num"></span>
            <span class="erp-list-col erp-list-col--nome">Nome do Cliente</span>
            <span class="erp-list-col erp-list-col--status">Status</span>
            <span class="erp-list-col erp-list-col--acoes">A&ccedil;&otilde;es</span>
        </div>

        <ol class="erp-list-body">
            <li wicket:id="clientes" class="erp-list-row">

                <span wicket:id="clienteNome" class="erp-list-col erp-list-col--nome">Nome</span>

                <div class="erp-list-col erp-list-col--status">
                    <span wicket:id="clienteStatus" class="erp-status">
                        <span class="erp-status-dot"></span>
                        <span wicket:id="statusTexto">Ativo</span>
                    </span>
                </div>

                <div class="erp-list-col erp-list-col--acoes">
                    <button class="erp-action-btn" title="Editar">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                    </button>
                    <button class="erp-action-btn" title="Gerar relat&oacute;rio">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                    </button>
                    <button class="erp-action-btn erp-action-btn--danger" title="Excluir">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
                    </button>
                </div>

            </li>
        </ol>

    </div>

</wicket:panel>
</body>
</html>
