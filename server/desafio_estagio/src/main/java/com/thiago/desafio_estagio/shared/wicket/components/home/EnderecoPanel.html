<!DOCTYPE html>
<html xmlns:wicket="http://wicket.apache.org" lang="pt-BR">
<body>
<wicket:panel>

    <div class="erp-endereco-card mb-3 p-3">
        <div class="row g-2 mb-2">
            <div class="col-4">
                <label class="erp-field-label">CEP</label>
                <input wicket:id="cep" type="text" class="form-control" placeholder="00000000" />
            </div>
            <div class="col-8">
                <label class="erp-field-label">LOGRADOURO</label>
                <input wicket:id="logradouro" type="text" class="form-control" placeholder="Rua, Avenida, Travessa…" />
            </div>
        </div>
        <div class="row g-2 mb-2">
            <div class="col-4">
                <label class="erp-field-label">N&Uacute;MERO</label>
                <input wicket:id="numero" type="text" class="form-control" />
            </div>
            <div class="col-8">
                <label class="erp-field-label">BAIRRO</label>
                <input wicket:id="bairro" type="text" class="form-control" />
            </div>
        </div>
        <div class="row g-2 mb-2">
            <div class="col-7">
                <label class="erp-field-label">CIDADE</label>
                <input wicket:id="cidade" type="text" class="form-control" />
            </div>
            <div class="col-5">
                <label class="erp-field-label">ESTADO (UF)</label>
                <input wicket:id="estado" type="text" class="form-control" maxlength="2" placeholder="SP" />
            </div>
        </div>
        <div class="row g-2 mb-3">
            <div class="col-6">
                <label class="erp-field-label">TELEFONE <span class="erp-field-optional">(opcional)</span></label>
                <input wicket:id="telefone" type="text" class="form-control" />
            </div>
            <div class="col-6">
                <label class="erp-field-label">COMPLEMENTO <span class="erp-field-optional">(opcional)</span></label>
                <input wicket:id="complemento" type="text" class="form-control" />
            </div>
        </div>
        <div class="d-flex align-items-center justify-content-between">
            <div class="form-check">
                <input wicket:id="enderecoPrincipal" type="checkbox" class="form-check-input" />
                <label class="form-check-label erp-field-label mb-0">Endere&ccedil;o principal</label>
            </div>
            <a wicket:id="remover" class="btn btn-sm btn-outline-danger">Remover</a>
        </div>
    </div>

</wicket:panel>
</body>
</html>
