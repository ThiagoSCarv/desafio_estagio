<!DOCTYPE html>
<html xmlns:wicket="http://wicket.apache.org" lang="pt-BR">
<body>
<wicket:panel>

    <header class="erp-head erp-head--detalhe">

        <nav class="erp-head-topbar">
            <a wicket:id="voltar" class="erp-btn-voltar">&#8249; VOLTAR</a>

            <a wicket:id="relatorio" class="erp-btn-relatorio">
                <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                    <line x1="16" y1="13" x2="8" y2="13"/>
                    <line x1="16" y1="17" x2="8" y2="17"/>
                    <polyline points="10 9 9 9 8 9"/>
                </svg>
                Relat&oacute;rio do cliente
            </a>
        </nav>

        <div class="erp-head-detalhe-body">
            <p class="erp-detalhe-eyebrow">
                <span wicket:id="tipoPessoaLabel">pessoa_juridica</span>
                &middot;
            </p>
            <h1 class="erp-title" wicket:id="nomeCliente">Carregando...</h1>
            <div wicket:id="statusContainer" class="erp-status">
                <span class="erp-status-dot"></span>
                <span class="erp-status__badge" wicket:id="statusLabel">CLIENTE ATIVO</span>
                <span class="erp-status__desde">&middot; desde <span wicket:id="desdeData">00/00/0000</span></span>
            </div>
        </div>

    </header>

    <div wicket:id="modalRelatorio" class="modal fade" tabindex="-1" aria-modal="true" role="dialog"></div>

</wicket:panel>
</body>
</html>
