<!DOCTYPE html>
<html xmlns:wicket="http://wicket.apache.org" lang="pt-BR">
<head><title>Lista de Clientes</title></head>
<body>
<wicket:panel>

    <div wicket:id="filtroPanel"></div>

    <div class="erp-list">

        <div class="erp-list-header">
            <span class="erp-list-col erp-list-col--nome">Nome do Cliente</span>
            <span class="erp-list-col erp-list-col--tipo">Tipo</span>
            <span class="erp-list-col erp-list-col--documento">Documento</span>
            <span class="erp-list-col erp-list-col--email">E-mail</span>
            <span class="erp-list-col erp-list-col--status">Status</span>
            <span class="erp-list-col erp-list-col--acoes">A&ccedil;&otilde;es</span>
        </div>

        <ul wicket:id="listaOrdenada" class="erp-list-body">
            <li wicket:id="clientes" class="erp-list-row">

                <span wicket:id="clienteNome" class="erp-list-col erp-list-col--nome">Nome</span>

                <span wicket:id="clienteTipo" class="erp-list-col erp-list-col--tipo">PF</span>

                <span wicket:id="clienteDocumento" class="erp-list-col erp-list-col--documento">000.000.000-00</span>

                <span wicket:id="clienteEmail" class="erp-list-col erp-list-col--email">email@exemplo.com</span>

                <div class="erp-list-col erp-list-col--status">
                    <span wicket:id="clienteStatus" class="erp-status">
                        <span class="erp-status-dot"></span>
                        <span wicket:id="statusTexto">Ativo</span>
                    </span>
                </div>

                <div wicket:id="acoes"></div>

            </li>
        </ul>

    </div>

    <div class="erp-pagination" style="margin-top: 1.25rem;">
        <span wicket:id="paginacaoInfo" class="erp-pagination__info">01 / 01</span>
        <div class="erp-pagination__nav">
            <a wicket:id="paginaAnterior" class="erp-page-btn" title="P&aacute;gina anterior">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            </a>
            <a wicket:id="proximaPagina" class="erp-page-btn" title="Pr&oacute;xima p&aacute;gina">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
            </a>
        </div>
    </div>

</wicket:panel>
</body>
</html>
