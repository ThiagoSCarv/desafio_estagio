<!DOCTYPE html>
<html xmlns:wicket="http://wicket.apache.org" lang="pt-BR">
<body>
<wicket:panel>

    <div class="erp-list-footer">

        <div><!-- espa&ccedil;o reservado para alinhamento com a pagina&ccedil;&atilde;o acima --></div>

        <div class="erp-global-actions">

            <a wicket:id="adicionarCliente" class="erp-btn-add">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                Adicionar novo cliente
            </a>

            <button class="erp-btn-report" data-bs-toggle="modal" data-bs-target="#modalRelatorioLista">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                    <line x1="16" y1="13" x2="8" y2="13"/>
                    <line x1="16" y1="17" x2="8" y2="17"/>
                    <polyline points="10 9 9 9 8 9"/>
                </svg>
                Emitir relat&oacute;rio completo
            </button>

            <a wicket:id="importarClientes" class="erp-btn-import">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                Importar via planilha
            </a>

        </div>

    </div>

    <!-- Modal: relat&oacute;rio completo (est&aacute;tico &mdash; apenas Bootstrap, sem Wicket) -->
    <div id="modalRelatorioLista" class="modal fade" tabindex="-1" aria-modal="true" role="dialog">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content erp-modal">
                <div class="modal-header">
                    <h5 class="modal-title">Emitir relat&oacute;rio completo</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Fechar"></button>
                </div>
                <div class="modal-body">
                    <p class="mb-3">Escolha o formato de exporta&ccedil;&atilde;o:</p>
                    <div class="d-flex gap-2">
                        <a href="/relatorio/clientes?formato=pdf" class="btn btn-danger flex-fill d-flex align-items-center justify-content-center gap-2"
                           onclick="bootstrap.Modal.getInstance(document.getElementById('modalRelatorioLista')).hide()">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                                <polyline points="14 2 14 8 20 8"/>
                                <line x1="16" y1="13" x2="8" y2="13"/>
                                <line x1="16" y1="17" x2="8" y2="17"/>
                                <polyline points="10 9 9 9 8 9"/>
                            </svg>
                            PDF
                        </a>
                        <a href="/relatorio/clientes?formato=xlsx" class="btn btn-success flex-fill d-flex align-items-center justify-content-center gap-2"
                           onclick="bootstrap.Modal.getInstance(document.getElementById('modalRelatorioLista')).hide()">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="3" width="18" height="18" rx="2"/>
                                <path d="M3 9h18M3 15h18M9 3v18"/>
                            </svg>
                            Excel
                        </a>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal: adicionar cliente (gerenciado pelo Wicket) -->
    <div wicket:id="modalAdicionar" class="modal fade" tabindex="-1" aria-modal="true" role="dialog"></div>

    <!-- Modal: importar clientes (gerenciado pelo Wicket) -->
    <div wicket:id="modalImportar" class="modal fade" tabindex="-1" aria-modal="true" role="dialog"></div>

</wicket:panel>
</body>
</html>
