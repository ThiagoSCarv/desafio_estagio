<!DOCTYPE html>
<html xmlns:wicket="http://wicket.apache.org" lang="pt-BR">
<body>
<wicket:panel>

    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content erp-modal">

            <div class="modal-header erp-modal-header-form">
                <div>
                    <h4 class="erp-modal-heading">
                        Atualizar <em class="erp-title--italic" wicket:id="titulotipo">pessoa física</em>
                    </h4>
                </div>
            </div>

            <form wicket:id="form">
                <div class="modal-body">
                    <div wicket:id="feedback"></div>

                    <div class="erp-client-badge mb-4">
                        <span class="erp-client-badge__label" wicket:id="badgeLabel">CLIENTE</span>
                        <span class="erp-client-badge__name" wicket:id="badgeName">—</span>
                    </div>

                    <div class="mb-3">
                        <label class="erp-field-label">
                            <span class="erp-field-num">01</span>
                            <span wicket:id="emailLabel">E-MAIL</span>
                        </label>
                        <input wicket:id="email" type="email" class="form-control" />
                    </div>

                    <div wicket:id="pfCampos" class="mb-3">
                        <label class="erp-field-label">
                            <span class="erp-field-num">02</span> NOME COMPLETO
                        </label>
                        <input wicket:id="nome" type="text" class="form-control" />
                    </div>

                    <div wicket:id="pjCampos">
                        <div class="mb-3">
                            <label class="erp-field-label">
                                <span class="erp-field-num">02</span> RAZ&Atilde;O SOCIAL
                            </label>
                            <input wicket:id="razaoSocial" type="text" class="form-control" />
                        </div>
                        <div class="mb-3">
                            <label class="erp-field-label">
                                <span class="erp-field-num">03</span> INSCRI&Ccedil;&Atilde;O ESTADUAL
                            </label>
                            <input wicket:id="inscricaoEstadual" type="text" class="form-control" />
                        </div>
                    </div>

                    <div>
                        <label class="erp-field-label">
                            <span class="erp-field-num" wicket:id="ativoNum">03</span> CLIENTE ATIVO
                        </label>
                        <div wicket:id="ativoGroup" class="erp-status-selector">
                            <label class="erp-status-btn">
                                <input wicket:id="radioAtivo" type="radio" />
                                ATIVO
                            </label>
                            <label class="erp-status-btn">
                                <input wicket:id="radioInativo" type="radio" />
                                INATIVO
                            </label>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button wicket:id="cancelar" type="button" class="btn btn-secondary">Cancelar</button>
                    <button wicket:id="salvar" type="submit" class="btn btn-success">Salvar altera&ccedil;&otilde;es</button>
                </div>
            </form>
        </div>
    </div>

</wicket:panel>
</body>
</html>
