<!DOCTYPE html>
<html xmlns:wicket="http://wicket.apache.org" lang="pt-BR">
<body>
<wicket:panel>

    <header class="erp-head">

        <nav class="erp-eyebrow">
            / cadastros &middot; clientes
        </nav>

        <div class="erp-head-body">

            <div class="erp-head-title-group">
                <h1 class="erp-title">Diretório</h1>
                <h1 class="erp-title erp-title--italic">de clientes</h1>
            </div>

            <div class="erp-stats">
                <div class="erp-stat">
                    <span class="erp-stat__label">Registros</span>
                    <span class="erp-stat__value" wicket:id="totalRegistros">000</span>
                </div>
                <div class="erp-stat">
                    <span class="erp-stat__label">Ativos</span>
                    <span class="erp-stat__value" wicket:id="totalAtivos">000</span>
                </div>
            </div>

        </div>

    </header>

</wicket:panel>
</body>
</html>
